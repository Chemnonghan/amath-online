<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>A-Math Mobile - Online Multiplayer</title>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <style>
        :root {
            --bg-main: #0f172a;
            --bg-card: #1e293b;
            --board-border: #334155;
            --tile-bg: #fffbeb;
            --tile-border: #f59e0b;
            --tile-text: #1e293b;
            --color-3x-eq: #ef4444; 
            --color-2x-eq: #f97316; 
            --color-3x-num: #3b82f6; 
            --color-2x-num: #06b6d4; 
            --color-star: #3b82f6;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-user-select: none; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            padding: 8px;
        }
        
        #lobby-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            width: 100%;
            max-width: 360px;
            background-color: var(--bg-card);
            padding: 30px 24px;
            border-radius: 20px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
            color: #f8fafc;
            text-align: center;
        }
        #lobby-container h2 { font-size: 1.5rem; color: #38bdf8; }
        #room-input {
            width: 100%; padding: 14px; border-radius: 12px; border: 2px solid #475569;
            background-color: #0f172a; color: white; font-size: 1.2rem; font-weight: bold; text-align: center; outline: none;
        }
        #room-input:focus { border-color: #38bdf8; }

        #game-container {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            height: 100%;
            width: 100%;
        }

        #top-bar {
            display: flex; justify-content: space-between; align-items: center; width: 100%; max-width: 440px;
            background-color: var(--bg-card); padding: 8px 16px; border-radius: 12px; color: #f8fafc;
        }
        .player-info { display: flex; flex-direction: column; padding: 4px 10px; border-radius: 8px; }
        .player-info.active { background-color: #334155; border: 1px solid #38bdf8; }
        .player-name { font-weight: bold; font-size: 0.95rem; color: #94a3b8; }
        .player-info.active .player-name { color: #38bdf8; }
        .player-score { font-size: 0.85rem; color: #cbd5e1; font-weight: bold; }
        #my-role { text-align: center; color: #38bdf8; font-weight: bold; margin-bottom: 2px; font-size: 0.85rem;}

        #board-container { width: 100%; max-width: 440px; aspect-ratio: 1 / 1; background-color: var(--board-border); padding: 4px; border-radius: 12px; }
        #board { display: grid; grid-template-columns: repeat(15, 1fr); grid-template-rows: repeat(15, 1fr); width: 100%; height: 100%; gap: 1px; }
        .cell { background-color: #334155; display: flex; align-items: center; justify-content: center; font-size: 0.45rem; font-weight: 800; color: #cbd5e1; text-align: center; border-radius: 2px; }
        .cell.x3-eq { background-color: var(--color-3x-eq); color: white; }
        .cell.x2-eq { background-color: var(--color-2x-eq); color: white; }
        .cell.x3-num { background-color: var(--color-3x-num); color: white; }
        .cell.x2-num { background-color: var(--color-2x-num); color: white; }
        .cell.star { background-color: var(--color-star); color: white; font-size: 0.8rem; }

        .tile-obj {
            position: relative; width: 100%; height: 100%;
            background: linear-gradient(135deg, #ffffff 0%, var(--tile-bg) 100%);
            border-bottom: 3px solid #d97706; border-radius: 4px;
            display: flex; align-items: center; justify-content: center; color: var(--tile-text);
        }
        .tile-obj .val { font-size: 1.15rem; font-weight: 800; }
        .cell .tile-obj .val { font-size: 0.95rem; }
        .tile-obj .pt { position: absolute; bottom: 1px; right: 3px; font-size: 0.5rem; color: #78350f; }

        #rack-container { width: 100%; max-width: 440px; background-color: var(--bg-card); padding: 10px; border-radius: 16px; }
        #rack { display: flex; justify-content: space-between; gap: 4px; height: 50px; }
        .tile-slot { flex: 1; height: 100%; aspect-ratio: 4 / 5; background-color: #1e293b; border: 1px dashed #475569; border-radius: 4px; }
        
        #rack .tile-obj.selected { transform: translateY(-10px); border: 2px solid #10b981; }
        #rack .tile-obj.swap-intent { transform: translateY(-8px); border: 2px solid #ef4444; background: #fee2e2; }

        #history-container { width: 100%; max-width: 440px; background-color: var(--bg-card); padding: 8px 12px; border-radius: 12px; }
        #history-title { font-size: 0.75rem; color: #94a3b8; font-weight: bold; margin-bottom: 4px; display: flex; justify-content: space-between;}
        #history-log { height: 60px; overflow-y: auto; display: flex; flex-direction: column; gap: 4px; padding-right: 4px; }
        .log-item { font-size: 0.75rem; color: #e2e8f0; background-color: #0f172a; padding: 4px 8px; border-radius: 6px; border-left: 3px solid #38bdf8; }

        #controls { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; width: 100%; max-width: 440px; }
        .btn { padding: 12px 4px; border: none; border-radius: 12px; font-size: 0.8rem; font-weight: bold; color: white; background: linear-gradient(135deg, #10b981 0%, #059669 100%); text-align: center; cursor: pointer; width: 100%; }
        .btn.recall { background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%); }
        .btn.pass { background: linear-gradient(135deg, #64748b 0%, #475569 100%); }
        .btn.exchange { background: linear-gradient(135deg, #a855f7 0%, #7e22ce 100%); }
        .btn.exchange.active { background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%); }
    </style>
</head>
<body>

    <div id="lobby-container">
        <h2>A-Math Online Lobby</h2>
        <p style="font-size: 0.85rem; color: #94a3b8;">กรอกรหัสห้องให้ตรงกับคู่แข่งขันของคุณ</p>
        <input type="text" id="room-input" placeholder="ใส่ ID ห้อง เช่น 9999" maxlength="10">
        <button class="btn" style="padding: 16px;" onclick="joinRoom()">เข้าสู่ห้องแข่งขัน</button>
    </div>

        <div style="width:100%; max-width:440px;">

            <div id="top-bar">
                <div class="player-info active" id="p1-info">
                    <span class="player-name">🔴 Player 1</span>
                    <span class="player-score">แต้ม: <span id="p1-score">0</span></span>
                </div>
                <div style="font-weight: bold; color: #94a3b8;">VS</div>
                <div class="player-info" id="p2-info">
                    <span class="player-name">🔵 Player 2</span>
                    <span class="player-score">แต้ม: <span id="p2-score">0</span></span>
                </div>
            </div>
        </div>

        <div id="board-container">
            <div id="board"></div>
        </div>

        <div id="history-container">
            <div id="history-title"><span>📋 ประวัติการเดินหมาก</span><span style="color: #64748b;">(ล่าสุดอยู่ล่าง)</span></div>
            <div id="history-log">
                <div style="color: #64748b; text-align: center; font-size: 0.75rem; margin-top: 15px;">กำลังรอเริ่มเกม...</div>
            </div>
        </div>
